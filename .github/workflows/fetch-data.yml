name: Fetch SEBI Feedback Data

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch today's data
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          FIRST_DAY=$(date -u +"%Y-%m-01")

          curl -s --location \
            'https://appiyouat.karix.solutions/appiyo/d/project/sebi_feedback_report/api/sebi_feedback_report' \
            --header 'authentication-token: W3ldogtBI4PYuwFPuS098vlEgqaHbthe4Ci1fin0CpIfXZJCEMLuKFgxM9RtZPcl' \
            --header 'Content-Type: application/json' \
            --data "{
              \"ProcessVariables\": {
                \"from_date\": \"${FIRST_DAY}T00:00:00.000\",
                \"to_date\": \"${TODAY}T23:59:59.999Z\"
              }
            }" > data.json

          echo "Fetched data:"
          head -c 500 data.json

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update feedback data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
